<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   
    <title>login form</title>
    <style>
        
        
    .body{
        background-color: rgb(204, 212, 92);
    justify-content: center;
    align-items: center;
    height: 100vh;
    display: flex;
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
}
  .login_box{

    width:250px;
    max-width:990px;
    padding: 25px;
    border: 1px solid rgb(219, 211, 211);
    border-radius: 15px;
    background-color: white;
}
.h1{
    display:flex;
    justify-content: center;
    margin-top: 10px ;
}
.input{
   
    width: 220px;
    padding: 5px;
    border-radius: 10px;
    margin: 5px;
    border:1px solid 
} 

.label{
margin:10px;
}

.btn_container{
    
    width: 80%;
    padding: 8px;
    background-color: rgb(25, 25, 26);
    color: rgb(255, 255, 255);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display:flex;
    justify-content:center ;
    font-weight: bold;
    margin-left: 24px;
    margin-top: 10px;
} 

.btn_container:hover{
    background-color:rgb(204, 212, 92);
color: black ;
}

</style>
  
<body class="body">
    <div class="login_box">

    <h1 class="h1">Login Form</h1>

    <form action="submit.html">
        <label class="label">Name </label><br>
        <input type="text" placeholder="Enter Name" class="input"><br><br>
        <label class="label">password</label><br>
        <input type="Password" placeholder="Enter Password" class="input"><br><br>
    
        <input type="submit" value="Submit"
         class="btn_container">
         
    </form>
    </div>
    

</body>
</head>
