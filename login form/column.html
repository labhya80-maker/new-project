<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="style.css">
    <title>Logi Form</title>
    <style>

        body {
    background-color: #f0f2f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.login-box {

    background-color: white;
    width: 100%;
    max-width: 900px;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.2);
}

.login-box h2 {
    text-align: center;
    margin-bottom: 20px;
}

.login-box label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
}

.login-box input {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border: 1px solid #ccc;
    border-radius: 20px;
    box-sizing: border-box;
}

.login-box button {
    width: 100%;
    padding: 12px;
    background-color: black;
    color: white;
    border: none;
    border-radius: 20px;
    cursor: pointer;
}
.button:hover{
    background-color: blue;
}
    </style>
</head>

<body>
    <div class="login-box">
    <h2>Login</h2>

    <label>Username</label><br>
    <input type="text" placeholder="EnterUsername"><br><br>

    <label>Password</label><br>
    <input type="password" placeholder="Enter Password"><br><br>

    <button>Login</button>
</div>
</body>
</html>
